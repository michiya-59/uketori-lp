  <rect x="15" y="19" width="8" height="1.8" rx="0.9" fill="#6366F1" opacity="0.3" />
  <!-- Checkmark circle -->
  <circle cx="26" cy="27" r="6" fill="#4F46E5" />
  <polyline points="23,27 25.2,29.5 29,24.5" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
